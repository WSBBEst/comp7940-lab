name: AWS EC2 Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest   # must be ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.EC2_KEY }}

      - name: Deploy application
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
          cd ~/chatbot_comp7940
          if ! command -v git >/dev/null 2>&1; then
            sudo dnf -y install git || sudo yum -y install git
          fi
          git pull origin main
          docker build -t comp7940-bot:latest .
          docker rm -f comp7940-bot || true
          docker run -d --restart=always --name comp7940-bot --env-file ~/chatbot_comp7940/.env comp7940-bot:latest
          EOF

resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80;
    server_name comp7940bot.duckdns.org;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name comp7940bot.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/comp7940bot.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/comp7940bot.duckdns.org/privkey.pem;

    location /telegram {
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://bot:8080/telegram;
    }
}
